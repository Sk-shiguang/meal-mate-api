server:
  port: 8080

spring:
  application:
    name: meal-mate-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/meal_mate}
    username: ${DATABASE_USERNAME:meal_mate}
    password: ${DATABASE_PASSWORD:meal_mate_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
