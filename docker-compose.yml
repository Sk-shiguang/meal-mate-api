services:
  postgres:
    image: postgres:17
    container_name: meal-mate-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meal_mate}
      POSTGRES_USER: ${POSTGRES_USER:-meal_mate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meal_mate_password}
      TZ: Asia/Shanghai
    volumes:
      - meal_mate_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meal_mate} -d ${POSTGRES_DB:-meal_mate}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meal_mate_postgres_data:
